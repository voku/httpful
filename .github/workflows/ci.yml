name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          extensions: curl, dom, fileinfo, json, simplexml, xmlwriter, zip
          tools: composer:v2

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "directory=$(composer config cache-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: ${{ matrix.php }}-composer-${{ hashFiles('composer.json', 'composer.lock') }}
          restore-keys: ${{ matrix.php }}-composer-

      - name: Validate composer configuration
        run: composer validate --strict

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction --prefer-stable
          composer dump-autoload -o

      - name: Audit dependencies
        run: composer audit

      - name: Run tests
        env:
          XDEBUG_MODE: coverage
        run: |
          mkdir -p build/logs
          if [[ "${{ matrix.php }}" == '8.5' ]]; then
            php vendor/bin/phpunit -c phpunit.xml.dist --coverage-clover=build/logs/clover.xml --coverage-xml=build/coverage-xml --log-junit=build/coverage-xml/junit.xml
          else
            php vendor/bin/phpunit -c phpunit.xml.dist --coverage-clover=build/logs/clover.xml
          fi

      - name: Run phpstan
        if: ${{ matrix.php == '8.5' }}
        run: |
          php vendor/bin/phpstan analyse

      - name: Run Infection
        if: ${{ matrix.php == '8.5' }}
        run: |
          php vendor/bin/infection --configuration=infection.json5 --coverage=build/coverage-xml --skip-initial-tests --only-covering-test-cases --show-mutations=0 --no-progress

      - name: Upload coverage results to Coveralls
        if: ${{ matrix.php == '8.5' }}
        env:
            COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            composer global require php-coveralls/php-coveralls
            php-coveralls --coverage_clover=build/logs/clover.xml -v

      - name: Upload coverage results to Codecov
        if: ${{ matrix.php == '8.5' }}
        uses: codecov/codecov-action@v5
        with:
          files: build/logs/clover.xml

      - name: Archive logs artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: logs_php-${{ matrix.php }}
          path: |
            build/logs
          if-no-files-found: ignore
